<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Artículo - ALS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f5f4f2; }
        .font-display { font-family: 'Playfair Display', serif; }
        .campo:focus { outline: none; border-color: #d63384; box-shadow: 0 0 0 3px rgba(214,51,132,0.12); }
        #zona-foto { transition: border-color 0.2s, background 0.2s; }
        #zona-foto:hover { border-color: #d63384; background-color: #fff0f6; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="bg-white sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-3 px-4 py-3 max-w-lg mx-auto">
            <a href="admin.html" class="w-9 h-9 flex items-center justify-center rounded-xl bg-gray-100 text-gray-500 hover:bg-pink-50 hover:text-pink-600 transition-colors">
                <span class="material-icons-round text-xl">arrow_back</span>
            </a>
            <div>
                <h1 class="font-display text-xl font-bold text-gray-900 leading-none">Nuevo Artículo</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-0.5">Agregar al inventario</p>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto mt-2">
        <form id="form-agregar" class="space-y-4">

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-3">Fotografía</p>
                <label id="zona-foto" class="w-full h-64 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center bg-gray-50 relative overflow-hidden cursor-pointer">
                    <div id="preview-placeholder" class="text-center select-none">
                        <div class="w-16 h-16 bg-pink-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
                            <span class="material-icons-round text-3xl text-pink-400">add_a_photo</span>
                        </div>
                        <p class="text-gray-500 text-sm font-bold">Toca para subir foto</p>
                        <p class="text-gray-400 text-xs mt-1">JPG o PNG</p>
                    </div>
                    <img id="preview-img" class="absolute inset-0 w-full h-full object-cover hidden">
                    <input type="file" id="input-foto" accept="image/*" class="hidden" required>
                </label>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-4">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Información</p>

                <div>
                    <label class="text-xs font-bold text-gray-600 ml-1">Nombre del Artículo</label>
                    <input type="text" name="nombre" placeholder="Ej. Vestido de Noche Azul" required
                        class="campo w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-xl text-sm transition-all">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-600 ml-1">Tipo</label>
                        <select id="tipo" name="tipo" class="campo w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-xl text-sm cursor-pointer transition-all">
                            <option value="Vestido">👗 Vestido</option>
                            <option value="Zapato">👠 Zapato</option>
                            <option value="Bolsa">👜 Bolsa</option>
                            <option value="Accesorios">💍 Accesorios</option>
                        </select>
                    </div>
                    <div id="contenedor-talla">
                        <label class="text-xs font-bold text-gray-600 ml-1">Talla</label>
                        <select id="talla" name="talla" class="campo w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold text-gray-800 cursor-pointer transition-all">
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-600 ml-1">Color</label>
                        <input type="text" id="color" name="color" list="colores-sugeridos" placeholder="Ej. Rojo vino" autocomplete="off"
                            class="campo w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-xl text-sm transition-all">
                        <datalist id="colores-sugeridos">
                            <option value="Negro"><option value="Blanco"><option value="Rojo">
                            <option value="Azul Rey"><option value="Verde Esmeralda"><option value="Rosa Palo">
                            <option value="Dorado"><option value="Plateado"><option value="Vino">
                        </datalist>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-600 ml-1">Precio Base</label>
                        <div class="relative mt-1">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm pointer-events-none">$</span>
                            <input type="number" name="precio" placeholder="0" required
                                class="campo w-full p-3 pl-7 bg-gray-50 border border-gray-200 rounded-xl text-sm transition-all">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-pink-50 rounded-2xl border border-pink-100 p-4">
                <div class="flex items-center gap-2 mb-3">
                    <span class="material-icons-round text-pink-400 text-base">auto_awesome</span>
                    <p class="text-[10px] font-bold text-pink-400 uppercase tracking-wider">Generado por el sistema</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-pink-400 font-bold uppercase tracking-wide">ID Artículo</label>
                        <input type="text" id="id" name="id" readonly
                            class="w-full p-2.5 mt-1 bg-white text-gray-500 font-mono text-xs rounded-xl border border-pink-100">
                    </div>
                    <div>
                        <label class="text-[10px] text-pink-400 font-bold uppercase tracking-wide">Código</label>
                        <input type="text" id="codigo" name="codigo" readonly
                            class="w-full p-2.5 mt-1 bg-white text-pink-600 font-mono font-bold text-xs rounded-xl border border-pink-200">
                    </div>
                </div>
            </div>

            <button type="submit" id="btn-guardar"
                class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-pink-600 transition-all active:scale-95 flex justify-center items-center gap-2 text-sm">
                <span class="material-icons-round text-lg">cloud_upload</span>
                Guardar en Inventario
            </button>

        </form>
    </main>

    <script src="agregar.js"></script>
</body>
</html>
