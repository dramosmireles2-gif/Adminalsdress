<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALS Admin · Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }

        /* Fondo con patrón sutil */
        .bg-pattern {
            background-color: #f5f4f2;
            background-image: radial-gradient(circle at 1px 1px, #e0ddd8 1px, transparent 0);
            background-size: 28px 28px;
        }

        /* Input focus */
        .campo:focus {
            outline: none;
            border-color: #d63384;
            box-shadow: 0 0 0 3px rgba(214,51,132,0.12);
        }

        /* Animación de entrada */
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-login { animation: cardIn 0.5s ease forwards; }
    </style>
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ALS Admin">
  <link rel="apple-touch-icon" href="./Icono.jpg">
  <meta name="theme-color" content="#d63384">
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-6">

    <div class="card-login bg-white w-full max-w-sm rounded-3xl shadow-xl border border-gray-100 overflow-hidden">

        <!-- Franja decorativa superior -->
        <div class="h-1.5 bg-gradient-to-r from-pink-400 via-pink-600 to-pink-400"></div>

        <div class="p-8">
            <!-- Logo -->
            <div class="text-center mb-8">
                <h1 class="font-display text-4xl font-bold text-gray-900 leading-none">
                    Als <span class="text-pink-600">Dress</span>
                </h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mt-2">Panel Administrativo</p>

                <div class="w-8 h-px bg-pink-200 mx-auto mt-4"></div>
            </div>

            <!-- Formulario -->
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">Correo Electrónico</label>
                    <input type="email" id="email" required
                        placeholder="correo@ejemplo.com"
                        class="campo w-full p-3.5 mt-1 rounded-2xl bg-gray-50 border border-gray-200 text-sm transition-all">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">Contraseña</label>
                    <input type="password" id="pass" required
                        placeholder="••••••••"
                        class="campo w-full p-3.5 mt-1 rounded-2xl bg-gray-50 border border-gray-200 text-sm transition-all">
                </div>

                <button type="submit"
                    class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold text-sm shadow-lg hover:bg-pink-600 active:scale-95 transition-all mt-2 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Entrar al Sistema
                </button>
            </form>

            <!-- Footer -->
            <p class="text-center text-[10px] text-gray-300 mt-6 font-bold uppercase tracking-widest">
                Als Dress · Reynosa
            </p>
        </div>
    </div>

    <script src="login.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("SW registrado ✅"))
      .catch(e => console.error("SW error:", e));
  }
</script>
</body>
</html>
